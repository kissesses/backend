name: Build&Push Release Docker Image

on:
  push:
    tags:
      - '*'

  workflow_dispatch:

env:
  REGISTRY_IMAGE: remnast/backend
  GHCR_IMAGE: ghcr.io/kissesses/backend

jobs:
  send-tg-msg:
    name: Send TG message
    runs-on: ubuntu-latest
    steps:
      - name: Checkout source code
        uses: actions/checkout@v7

      - name: Send Telegram message
        uses: proDreams/actions-telegram-notifier@main
        with:
          token: ${{ secrets.TELEGRAM_TOKEN }}
          chat_id: ${{ secrets.TELEGRAM_CHAT_ID }}
          thread_id: ${{ secrets.TELEGRAM_TOPIC_ID }}
          status: info
          notify_fields: 'repository,branch,commit,workflow'
          title: 'Build started.'

  build-docker-image:
    name: Build linux/amd64
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.TOKEN_GH_DEPLOY }}

      - name: Prepare build metadata
        id: meta
        run: |
          echo "version=$(jq -r .version package.json)" >> $GITHUB_OUTPUT
          echo "build_time=$(date -u +'%Y-%m-%dT%H:%M:%SZ')" >> $GITHUB_OUTPUT
          echo "frontend_commit=$(curl -s https://api.github.com/repos/kissesses/frontend/commits/${{ github.ref_name }} | jq -r '.sha')" >> $GITHUB_OUTPUT

      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: .
          file: Dockerfile
          platforms: linux/amd64
          push: true
          tags: |
            ${{ env.REGISTRY_IMAGE }}:latest
            ${{ env.REGISTRY_IMAGE }}:${{ github.ref_name }}
            ${{ env.REGISTRY_IMAGE }}:2
            ${{ env.GHCR_IMAGE }}:latest
            ${{ env.GHCR_IMAGE }}:${{ github.ref_name }}
            ${{ env.GHCR_IMAGE }}:2
          build-args: |
            FRONTEND_URL=https://github.com/kissesses/frontend/releases/download/${{ github.ref_name }}/remnawave-frontend.zip
            __RW_METADATA_GIT_BRANCH=main
            __RW_METADATA_BUILD_TIME=${{ steps.meta.outputs.build_time }}
            __RW_METADATA_BUILD_NUMBER=${{ github.run_number }}
            __RW_METADATA_VERSION=${{ steps.meta.outputs.version }}
            __RW_METADATA_GIT_BACKEND_COMMIT=${{ github.sha }}
            __RW_METADATA_GIT_FRONTEND_COMMIT=${{ steps.meta.outputs.frontend_commit }}

  create-release:
    needs: [build-docker-image]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22.x'

      - name: NewTag
        id: tag
        uses: JinoArch/get-latest-tag@latest

      - name: Generate changelog
        id: changelog
        run: |
          CHANGELOG=$(npx changelogen --from=${{ steps.tag.outputs.previousTag }} --to=${{ steps.tag.outputs.latestTag }} | sed '/^\[log\]/d')
          echo "CHANGELOG<<EOF" >> $GITHUB_ENV
          echo "$CHANGELOG" >> $GITHUB_ENV
          echo "EOF" >> $GITHUB_ENV

      - name: Create Release
        uses: softprops/action-gh-release@v2
        env:
          GITHUB_TOKEN: ${{ secrets.TOKEN_GH_DEPLOY }}
        with:
          tag_name: ${{ github.ref_name }}
          name: v${{ github.ref_name }}
          generate_release_notes: true
          append_body: true
          make_latest: true
          draft: false
          prerelease: false
          body: |
            🌊 Remnawave Backend v${{ github.ref_name }}

            <p align="center">
              <a href="https://t.me/remnawave" target="_blank" rel="noopener noreferrer">
                <img src="https://img.shields.io/badge/Join%20community-Telegram-26A5E4?style=for-the-badge&logo=telegram&logoColor=white" alt="Join community on Telegram" width="220" height="auto">
              </a>
            </p>

            ${{ env.CHANGELOG }}

            Latest Docker image:
            - `remnast/backend:latest`
            - `ghcr.io/kissesses/backend:latest`

            Docker images:
            - `remnast/backend:${{github.ref_name}}`
            - `ghcr.io/kissesses/backend:${{github.ref_name}}`

  send-finish-tg-msg:
    name: Send TG message
    needs: [build-docker-image, create-release]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout source code
        uses: actions/checkout@v7

      - name: Send Telegram message
        uses: proDreams/actions-telegram-notifier@main
        with:
          token: ${{ secrets.TELEGRAM_TOKEN }}
          chat_id: ${{ secrets.TELEGRAM_CHAT_ID }}
          thread_id: ${{ secrets.TELEGRAM_TOPIC_ID }}
          status: ${{ job.status }}
          notify_fields: 'repository,branch,commit'
          title: 'Build finished.'

  notify-on-error:
    runs-on: ubuntu-latest
    needs: [build-docker-image, create-release]
    if: failure()
    steps:
      - name: Checkout source code
        uses: actions/checkout@v7

      - name: Send error notification
        uses: proDreams/actions-telegram-notifier@main
        with:
          token: ${{ secrets.TELEGRAM_TOKEN }}
          chat_id: ${{ secrets.TELEGRAM_CHAT_ID }}
          thread_id: ${{ secrets.TELEGRAM_TOPIC_ID }}
          status: failure
          notify_fields: 'repository,branch,commit,workflow'
          title: 'Build failed.'
